name: build and deploy on the git page

on:
  push:
    branches: ["main"]
  workflow_dispatch: true
 
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 检出代码
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 安装 Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: 'latest'
      
          # 5. 执行 Python 构建脚本
      # 请确保此脚本能生成最终的静态网站文件，例如放在 './public' 目录下
      - name: 运行 Python 构建脚本
        run: |
          python build.py

      # 6. 部署到 gh-pages 分支
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public  # 你的静态网站生成目录，如果不同请修改
          publish_branch: gh-pages  # 部署到的分支
