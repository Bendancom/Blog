<div id="post">
	<header>
		${metadata}	
		<div id="post-divider"></div>
	</header>
	<main>
		<article data-title="${title}" data-subtitle="${subtitle}" data-fulltitle="${fulltitle}" data-authors="${authors}" data-date="${date}" data-category="${category}" data-tags="${tags}" data-description="${description}">
        	${content}
		</article>
	</main>
</div>
${pagination}

<div id="comment">
	<script>
		(() => {
			const current = document.currentScript;
			let type = localStorage.getItem("Scheme")
			if (type == null) {
				localStorage.setItem("Scheme", "system");
				type = "system"
			}

			const newScript = document.createElement("script");
			newScript.src = "https://giscus.app/client.js"
			newScript.setAttribute("data-repo", "${repo}")
			newScript.setAttribute("data-repo-id", "${repoId}")
			newScript.setAttribute("data-category", "${repoCategory}")
			newScript.setAttribute("data-category-id", "${repoCategoryId}")
			newScript.setAttribute("data-mapping", "${mapping}")
			newScript.setAttribute("data-strict", "${strict}")
			newScript.setAttribute("data-reaction-enabled", "${reactionEnabled}")
			newScript.setAttribute("data-emit-metadata", "${emitMetadata}")
			newScript.setAttribute("data-input-position", "${inputPosition}")
			newScript.setAttribute("data-theme", type == "system" ? "preferred_color_scheme" : type)
			newScript.setAttribute("data-lang", "${lang}")
			newScript.setAttribute("data-loading", "${loading}")
			newScript.setAttribute("crossorigin", "${crossorigin}")
			newScript.async = true;

			current.parentNode.appendChild(newScript);
		}) ()
	</script>
</div>
