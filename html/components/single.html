<div class="archive-item-wrapper single" data-category="${category}" data-tags="${tags}" data-authors="${authors}">
	<a class="archive-item" href="${premalink}">
		<div class="archive-full-title">
			<div class="archive-title">${title}</div>
			<div class="archive-divider">${divider}</div>
			<div class="archive-subtitle">${subtitle}</div>
		</div>
		<div class="archive-date">${date} </div>
	</a>
</div>
